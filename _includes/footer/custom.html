{% assign footer_owner = site.author.name | default: site.title %}
{% assign footer_updated_at = page.last_modified_at | default: page.modified | default: site.time %}

<style>
  .site-footer-meta {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0.9rem 1.2rem;
    flex-wrap: wrap;
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--global-text-color-light);
  }

  .site-footer-meta__info {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    flex-wrap: wrap;
  }

  .site-footer-meta__sep {
    opacity: 0.6;
  }

  @media (max-width: 720px) {
    .site-footer-meta {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>

<div class="site-footer-meta">
  <div class="site-footer-meta__info">
    <span>&copy; {{ footer_owner }}</span>
    <span class="site-footer-meta__sep">&middot;</span>
    <span>Latest updated {{ footer_updated_at | date: "%b. %Y" }}</span>
  </div>
</div>
